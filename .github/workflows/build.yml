name: Build and Release APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/CommunityAlert.apk || mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/CommunityAlert.apk || true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CommunityAlert
          path: app/build/outputs/apk/release/CommunityAlert.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: CommunityAlert v1.0.0
          files: app/build/outputs/apk/release/CommunityAlert.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}